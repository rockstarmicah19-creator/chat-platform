<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo Chat | Pro Messenger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-overlay">
        <div class="login-card">
            <div class="echo-logo-large">E</div>
            <h1>Echo Chat</h1>
            <p>Real-time conversations, reimagined.</p>
            <button id="google-login-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/google.svg" width="18"> 
                Sign in with Google
            </button>
        </div>
    </div>

    <div id="app">
        <aside class="sidebar">
            <div class="server-icon active" id="global-btn" title="Global Chat">G</div>
            <div id="group-list"></div>
            <button class="action-btn" id="create-group-btn" title="Create Group">+</button>
            <div class="spacer"></div>
            <button class="action-btn" id="friends-tab-btn" title="Friends">👥</button>
            <a href="admin.html" id="admin-link" class="action-btn hidden" title="Admin Panel">⚙️</a>
            <img id="user-avatar" class="avatar-icon hidden" src="">
            <button id="logout-btn" title="Logout">🚪</button>
        </aside>

        <main class="chat-area">
            <header class="chat-header">
                <h2 id="chat-title"># global-echo</h2>
            </header>
            
            <div id="messages-container"></div>

            <div id="gif-menu" class="hidden">
                <input type="text" id="gif-search" placeholder="Search Tenor...">
                <div id="gif-results"></div>
            </div>

            <form id="message-form">
                <div class="input-wrapper">
                    <button type="button" id="gif-trigger">GIF</button>
                    <input type="text" id="message-input" placeholder="Message Echo..." autocomplete="off">
                    <button type="submit" id="send-btn">Send</button>
                </div>
            </form>
        </main>
    </div>

    <div id="friends-modal" class="modal-overlay hidden">
        <div class="modal">
            <h3>Social Hub</h3>
            <div class="tab-content">
                <input type="email" id="friend-email" placeholder="Enter friend's email...">
                <button id="send-request-btn">Add Friend</button>
                <div id="request-status"></div>
            </div>
            <button class="close-btn">Close</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
