<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Echo Chat | Admin Panel</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-box { padding: 50px; text-align: center; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .stat-card { background: #2b2d31; padding: 20px; border-radius: 10px; border-top: 4px solid var(--accent); }
    </style>
</head>
<body>
    <div id="admin-gate" class="admin-box">
        <h1>Admin Verification</h1>
        <button id="verify-btn">Verify Identity</button>
        <p id="status"></p>
    </div>

    <div id="admin-dashboard" class="admin-box hidden">
        <h1>Echo Control Center</h1>
        <div class="stat-grid">
            <div class="stat-card"><h2>Users</h2><p id="u-count">Loading...</p></div>
            <div class="stat-card"><h2>Groups</h2><p id="g-count">Loading...</p></div>
        </div>
        <br><button onclick="location.href='index.html'">Back to Chat</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAfFJ9UOzF1n7FH3pimUdc9WiXeXe9PZiY", authDomain: "my-project-10bd5.firebaseapp.com", projectId: "my-project-10bd5" };
        const ADMIN_EMAIL = "YOUR_EMAIL@GMAIL.COM"; // <-- MUST MATCH SCRIPT.JS

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user && user.email === ADMIN_EMAIL) {
                document.getElementById('admin-gate').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                const u = await getDocs(collection(db, "users"));
                const g = await getDocs(collection(db, "groups"));
                document.getElementById('u-count').innerText = u.size;
                document.getElementById('g-count').innerText = g.size;
            } else if (user) {
                document.getElementById('status').innerText = "Access Denied: You are not an admin.";
            }
        });
        document.getElementById('verify-btn').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
    </script>
</body>
</html>
