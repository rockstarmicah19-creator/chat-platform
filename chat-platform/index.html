<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Platform - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>ChatHub</h1>
                <p>Connect with friends instantly</p>
            </div>

            <!-- Login Form -->
            <div id="loginForm" class="auth-form active">
                <h2>Login</h2>
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="loginEmail">Email</label>
                        <input type="email" id="loginEmail" required placeholder="your@email.com">
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn-primary">Login</button>
                </form>
                <p class="auth-toggle">Don't have an account? <a href="#" onclick="toggleForm()">Sign up</a></p>
                <p class="auth-link"><a href="#" onclick="showPasswordReset()">Forgot password?</a></p>
            </div>

            <!-- Signup Form -->
            <div id="signupForm" class="auth-form">
                <h2>Sign Up</h2>
                <form onsubmit="handleSignup(event)">
                    <div class="form-group">
                        <label for="signupUsername">Username</label>
                        <input type="text" id="signupUsername" required placeholder="Your username">
                    </div>
                    <div class="form-group">
                        <label for="signupEmail">Email</label>
                        <input type="email" id="signupEmail" required placeholder="your@email.com">
                    </div>
                    <div class="form-group">
                        <label for="signupPassword">Password</label>
                        <input type="password" id="signupPassword" required placeholder="••••••••">
                    </div>
                    <div class="form-group">
                        <label for="signupConfirmPassword">Confirm Password</label>
                        <input type="password" id="signupConfirmPassword" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn-primary">Sign Up</button>
                </form>
                <p class="auth-toggle">Already have an account? <a href="#" onclick="toggleForm()">Login</a></p>
            </div>

            <!-- Password Reset Form -->
            <div id="resetForm" class="auth-form">
                <h2>Reset Password</h2>
                <form onsubmit="handlePasswordReset(event)">
                    <div class="form-group">
                        <label for="resetEmail">Email</label>
                        <input type="email" id="resetEmail" required placeholder="your@email.com">
                    </div>
                    <button type="submit" class="btn-primary">Send Reset Link</button>
                </form>
                <p class="auth-link"><a href="#" onclick="showLoginForm()">Back to login</a></p>
            </div>

            <div id="authMessage" class="auth-message"></div>

            <!-- Theme Selector Button -->
            <div style="text-align: center; margin-top: 20px;">
                <button id="authThemeBtn" class="btn-secondary" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;">
                    <i class="fas fa-palette"></i> Change Theme
                </button>
            </div>
        </div>
    </div>

    <!-- Theme Selector Modal for Auth -->
    <div id="authThemeModal" class="modal">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header">
                <h2>🎨 Choose Theme</h2>
                <button class="btn-close">&times;</button>
            </div>
            <div id="authThemeGrid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 20px; max-height: 500px; overflow-y: auto;">
                <!-- Themes populated by JS -->
            </div>
        </div>
    </div>

    <script type="module" src="js/firebase.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/theme.js"></script>
    <script type="module">
        import { initThemes, getAvailableThemes, applyTheme } from './js/theme.js';
        
        // Initialize themes on page load
        initThemes();
        
        // Theme selector functionality
        const authThemeBtn = document.getElementById('authThemeBtn');
        const authThemeModal = document.getElementById('authThemeModal');
        const authThemeGrid = document.getElementById('authThemeGrid');
        
        if (authThemeBtn && authThemeModal) {
            authThemeBtn.addEventListener('click', () => {
                authThemeModal.classList.add('active');
                populateAuthThemes();
            });
            
            // Close theme modal when clicking the close button
            const closeBtn = authThemeModal.querySelector('.btn-close');
            if (closeBtn) {
                closeBtn.addEventListener('click', () => {
                    authThemeModal.classList.remove('active');
                });
            }
            
            // Close theme modal when clicking outside
            authThemeModal.addEventListener('click', (e) => {
                if (e.target === authThemeModal) {
                    authThemeModal.classList.remove('active');
                }
            });
        }
        
        function populateAuthThemes() {
            const themes = getAvailableThemes();
            authThemeGrid.innerHTML = '';
            
            Object.entries(themes).forEach(([themeKey, themeName]) => {
                const themeBtn = document.createElement('button');
                themeBtn.type = 'button';
                themeBtn.textContent = themeName;
                themeBtn.style.cssText = `
                    padding: 12px;
                    border: 2px solid transparent;
                    border-radius: 6px;
                    background: var(--bg-secondary);
                    color: var(--text-primary);
                    cursor: pointer;
                    font-size: 0.9rem;
                    transition: all 0.3s ease;
                    font-weight: 500;
                `;
                
                themeBtn.addEventListener('mouseover', () => {
                    themeBtn.style.borderColor = 'var(--primary)';
                    themeBtn.style.boxShadow = '0 0 15px rgba(0, 0, 0, 0.3)';
                });
                
                themeBtn.addEventListener('mouseout', () => {
                    themeBtn.style.borderColor = 'transparent';
                    themeBtn.style.boxShadow = 'none';
                });
                
                themeBtn.addEventListener('click', () => {
                    applyTheme(themeKey);
                    authThemeModal.classList.remove('active');
                });
                
                authThemeGrid.appendChild(themeBtn);
            });
        }
    </script>
</body>
</html>
