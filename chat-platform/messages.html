<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatHub - Direct Messages & Friends</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="app-page">
    <div class="app-container">
        <!-- Left Sidebar - Navigation -->
        <aside class="sidebar-servers" style="width: 72px;">
            <div class="servers-header">
                <a href="app.html" class="btn-icon" title="Back to Chat">
                    <i class="fas fa-arrow-left"></i>
                </a>
            </div>
            <div class="servers-list">
                <a href="profile.html" class="server-item" title="My Profile">
                    <i class="fas fa-user"></i>
                </a>
                <a href="messages.html" class="server-item active" title="Direct Messages">
                    <i class="fas fa-comments"></i>
                </a>
                <a href="settings.html" class="server-item" title="Settings">
                    <i class="fas fa-cog"></i>
                </a>
                <a href="discover.html" class="server-item" title="Discover Servers">
                    <i class="fas fa-compass"></i>
                </a>
            </div>
        </aside>

        <!-- Messages Sidebar -->
        <aside class="sidebar-channels" style="width: 280px; border-right: 1px solid var(--border-color);">
            <div class="channels-header" style="display: flex; justify-content: space-between; align-items: center; padding: var(--spacing-md);">
                <h2 style="margin: 0; font-size: 1.1rem;">Direct Messages</h2>
                <button id="newMessageBtn" class="btn-icon" title="New Message" onclick="openNewMessage()">
                    <i class="fas fa-edit"></i>
                </button>
            </div>

            <!-- Search -->
            <div style="padding: var(--spacing-sm) var(--spacing-md); border-bottom: 1px solid var(--border-color);">
                <input type="text" id="dmSearch" placeholder="Search conversations..." class="input-enhanced" style="font-size: 0.9rem;">
            </div>

            <!-- Friends/Messages List -->
            <div id="dmList" class="channels-list" style="max-height: calc(100vh - 200px); overflow-y: auto;">
                <!-- Messages loaded by JS -->
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main" style="flex: 1;">
            <!-- Header -->
            <div class="chat-header">
                <div class="header-left">
                    <h2 id="chatTitle">Select a conversation</h2>
                    <p id="chatSubtitle" style="color: var(--text-tertiary); font-size: 0.9rem;">Pick a friend to start messaging</p>
                </div>
                <div class="header-right">
                    <button id="callBtn" class="btn-icon" title="Start Call">
                        <i class="fas fa-phone"></i>
                    </button>
                    <button id="videoBtn" class="btn-icon" title="Start Video">
                        <i class="fas fa-video"></i>
                    </button>
                    <button id="infoBtn" class="btn-icon" title="User Info">
                        <i class="fas fa-info-circle"></i>
                    </button>
                    <button id="themeBtn" class="btn-icon" title="Change Theme">
                        <i class="fas fa-palette"></i>
                    </button>
                </div>
            </div>

            <!-- Messages Container -->
            <div id="messagesContainer" class="messages-container" style="display: flex; flex-direction: column; align-items: center; justify-content: center;">
                <div class="welcome-message">
                    <i class="fas fa-comments" style="font-size: 3rem; color: var(--primary); margin-bottom: var(--spacing-lg);"></i>
                    <h1>Welcome to Direct Messages</h1>
                    <p>Select a conversation to start chatting</p>
                    <button class="btn-primary" onclick="openNewMessage()" style="margin-top: var(--spacing-lg); width: auto; padding: 12px 24px;">
                        <i class="fas fa-edit"></i> Start New Conversation
                    </button>
                </div>
            </div>

            <!-- Message Input -->
            <div class="message-input-area" style="display: none;" id="messageInputArea">
                <div class="input-actions">
                    <button class="btn-icon-input" title="Attach File">
                        <i class="fas fa-paperclip"></i>
                    </button>
                    <button class="btn-icon-input" title="Add Emoji">
                        <i class="fas fa-smile"></i>
                    </button>
                    <button id="gifBtnDM" class="btn-icon-input" title="GIF" onclick="openGifPicker()">
                        <i class="fas fa-images"></i>
                    </button>
                </div>
                <input type="text" id="messageText" class="message-input" placeholder="Message...">
                <button class="btn-icon-input send-btn" title="Send" onclick="sendMessage()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </main>

        <!-- User Info Sidebar -->
        <aside class="sidebar-members" style="width: 0; display: none; overflow: hidden; transition: width 0.3s ease;" id="userInfoSidebar">
            <div class="members-header" style="padding: var(--spacing-lg); border-bottom: 1px solid var(--border-color);">
                <h3 id="userInfoName">Friend Name</h3>
            </div>
            <div style="padding: var(--spacing-lg); flex: 1; overflow-y: auto;">
                <div style="display: flex; flex-direction: column; gap: var(--spacing-md);">
                    <!-- Friend info -->
                    <div style="text-align: center; padding: var(--spacing-lg); background: var(--bg-secondary); border-radius: 8px;">
                        <div class="user-avatar-large" style="width: 80px; height: 80px; margin: 0 auto 12px;">F</div>
                        <h3 id="friendName" style="margin: 0; margin-bottom: 4px;">Friend Name</h3>
                        <span class="status-badge online" id="friendStatus">Online</span>
                    </div>

                    <!-- Friend Stats -->
                    <div style="background: var(--bg-secondary); border-radius: 8px; padding: var(--spacing-md);">
                        <h4 style="margin: 0 0 12px 0; color: var(--text-secondary); font-size: 0.9rem;">Mutual Servers</h4>
                        <div id="mutualServers">
                            <div style="padding: 8px; background: var(--bg-tertiary); border-radius: 6px; margin-bottom: 8px; font-size: 0.9rem;">Gaming Hub</div>
                            <div style="padding: 8px; background: var(--bg-tertiary); border-radius: 6px; font-size: 0.9rem;">Study Group</div>
                        </div>
                    </div>

                    <!-- Actions -->
                    <div style="display: flex; flex-direction: column; gap: 8px;">
                        <button class="btn-rich" onclick="callFriend()">
                            <i class="fas fa-phone"></i> Call
                        </button>
                        <button class="btn-rich secondary">
                            <i class="fas fa-user-check"></i> Profile
                        </button>
                        <button class="btn-rich secondary" style="color: var(--danger); border-color: var(--danger);">
                            <i class="fas fa-ban"></i> Block
                        </button>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <!-- New Message Modal -->
    <div id="newMessageModal" class="modal">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header">
                <h2>Start New Conversation</h2>
                <button class="btn-close" onclick="closeModal('newMessageModal')">&times;</button>
            </div>
            <div class="modal-body" style="padding: var(--spacing-lg);">
                <div class="form-group">
                    <label style="color: var(--text-secondary); font-weight: 600; margin-bottom: 8px; display: block;">Select Friend</label>
                    <input type="text" id="friendSearch" placeholder="Search friends..." class="input-enhanced">
                </div>
                <div id="friendsList" style="margin-top: var(--spacing-md); max-height: 300px; overflow-y: auto;">
                    <!-- Friends loaded by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Theme Modal -->
    <div id="themeModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Select Theme</h2>
                <button class="btn-close" onclick="closeModal('themeModal')">&times;</button>
            </div>
            <div style="padding: var(--spacing-lg); display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: var(--spacing-md); max-height: 400px; overflow-y: auto;" id="themeGrid">
                <!-- Themes populated by JS -->
            </div>
        </div>
    </div>

    <!-- GIF Picker Modal -->
    <div id="gifPickerModal" class="modal">
        <div class="modal-content" style="max-width: 700px; max-height: 90vh; display: flex; flex-direction: column;">
            <div class="modal-header">
                <h2>GIF Picker</h2>
                <button class="btn-close" onclick="closeGifPicker()">&times;</button>
            </div>
            <div class="modal-body" style="display: flex; flex-direction: column; flex: 1; overflow: hidden;">
                <div style="margin-bottom: var(--spacing-md);">
                    <input type="text" id="gifSearch" placeholder="Search GIFs..." class="input-enhanced" style="width: 100%;">
                </div>
                <div id="gifResults" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: var(--spacing-md); overflow-y: auto; flex: 1;">
                    <!-- GIFs loaded here -->
                </div>
            </div>
        </div>
    </div>

    <script src="js/theme.js"></script>
    <script>
        const TENOR_API_KEY = 'AIzaSyDVGpa-xoE0MbB272-ZYL_mk3lK1AMKpRY';

        // Open GIF picker
        function openGifPicker() {
            document.getElementById('gifPickerModal').classList.add('active');
            loadTrendingGifs();
        }

        // Close GIF picker
        function closeGifPicker() {
            document.getElementById('gifPickerModal').classList.remove('active');
        }

        // Load trending GIFs
        function loadTrendingGifs() {
            fetch(`https://tenor.googleapis.com/v2/featured?key=${TENOR_API_KEY}&client_key=my_app&limit=20`)
                .then(response => response.json())
                .then(data => displayGifs(data.results))
                .catch(error => console.error('Error loading GIFs:', error));
        }

        // Search GIFs
        document.getElementById('gifSearch').addEventListener('input', (e) => {
            const query = e.target.value.trim();
            if (query.length > 0) {
                fetch(`https://tenor.googleapis.com/v2/search?q=${encodeURIComponent(query)}&key=${TENOR_API_KEY}&client_key=my_app&limit=20`)
                    .then(response => response.json())
                    .then(data => displayGifs(data.results))
                    .catch(error => console.error('Error searching GIFs:', error));
            } else {
                loadTrendingGifs();
            }
        });

        // Display GIFs
        function displayGifs(gifs) {
            const gifResults = document.getElementById('gifResults');
            gifResults.innerHTML = gifs.map(gif => `
                <div onclick="selectGif('${gif.media_formats.gif.url}')" style="cursor: pointer; border-radius: 8px; overflow: hidden; background: var(--bg-secondary); border: 1px solid var(--border-color); transition: all 0.2s ease;" onmouseover="this.style.boxShadow='0 4px 12px rgba(88, 101, 242, 0.3)'" onmouseout="this.style.boxShadow='none'">
                    <img src="${gif.media_formats.gif.url}" alt="GIF" style="width: 100%; height: 150px; object-fit: cover; display: block;">
                </div>
            `).join('');
        }

        // Select GIF
        function selectGif(gifUrl) {
            const messageInput = document.getElementById('messageText');
            if (messageInput) {
                messageInput.value = gifUrl;
            }
            closeGifPicker();
        }

        // Close modal on background click
        document.getElementById('gifPickerModal').addEventListener('click', (e) => {
            if (e.target.id === 'gifPickerModal') closeGifPicker();
        });
    </script>
    <script>
        let friends = [
            { id: 1, name: 'Sarah Johnson', username: '@sarah', status: 'online', avatar: 'S', lastMessage: 'See you soon! 😊', time: '2m' },
            { id: 2, name: 'Alex Chen', username: '@alex', status: 'online', avatar: 'A', lastMessage: 'Thanks for the help!', time: '15m' },
            { id: 3, name: 'Jordan Lee', username: '@jordan', status: 'idle', avatar: 'J', lastMessage: 'Let\'s play later?', time: '1h' },
            { id: 4, name: 'Casey Smith', username: '@casey', status: 'offline', avatar: 'C', lastMessage: 'Good night!', time: '3h' },
            { id: 5, name: 'Morgan Brown', username: '@morgan', status: 'online', avatar: 'M', lastMessage: 'Check your DM', time: '5m' }
        ];

        // Load friends list
        function loadDMList() {
            const dmList = document.getElementById('dmList');
            dmList.innerHTML = friends.map(friend => `
                <div class="channel-item" onclick="openConversation(${friend.id}, '${friend.name}')" style="cursor: pointer; display: flex; align-items: center; gap: var(--spacing-sm); padding: var(--spacing-md);">
                    <div style="position: relative;">
                        <div class="member-avatar" style="width: 40px; height: 40px;">${friend.avatar}</div>
                        <div style="position: absolute; bottom: 0; right: 0; width: 12px; height: 12px; border-radius: 50%; background: ${friend.status === 'online' ? '#57F287' : friend.status === 'idle' ? '#FFA500' : '#72767D'}; border: 2px solid var(--bg-secondary);"></div>
                    </div>
                    <div style="flex: 1; min-width: 0;">
                        <div style="font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${friend.name}</div>
                        <div style="font-size: 0.85rem; color: var(--text-tertiary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${friend.lastMessage}</div>
                    </div>
                    <div style="font-size: 0.75rem; color: var(--text-tertiary);">${friend.time}</div>
                </div>
            `).join('');
        }

        // Open conversation
        function openConversation(friendId, friendName) {
            const messagesContainer = document.getElementById('messagesContainer');
            const messageInputArea = document.getElementById('messageInputArea');
            const chatTitle = document.getElementById('chatTitle');
            const chatSubtitle = document.getElementById('chatSubtitle');

            chatTitle.textContent = friendName;
            chatSubtitle.textContent = 'Direct Message';
            messageInputArea.style.display = 'flex';
            
            messagesContainer.innerHTML = `
                <div style="padding: var(--spacing-lg); text-align: center; color: var(--text-tertiary);">
                    <p>This is the beginning of your direct message with ${friendName}</p>
                </div>
            `;

            document.getElementById('userInfoSidebar').style.width = '280px';
            document.getElementById('userInfoName').textContent = friendName;
            document.getElementById('friendName').textContent = friendName;
        }

        // Open new message modal
        function openNewMessage() {
            document.getElementById('newMessageModal').classList.add('active');
            loadFriendsForSelection();
        }

        // Load friends for selection
        function loadFriendsForSelection() {
            const friendsList = document.getElementById('friendsList');
            friendsList.innerHTML = friends.map(friend => `
                <div onclick="openConversation(${friend.id}, '${friend.name}'); closeModal('newMessageModal');" style="padding: var(--spacing-md); background: var(--bg-secondary); border-radius: 6px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; gap: var(--spacing-sm);">
                    <div class="member-avatar">${friend.avatar}</div>
                    <div>
                        <div style="font-weight: 500;">${friend.name}</div>
                        <div style="font-size: 0.85rem; color: var(--text-tertiary);">${friend.username}</div>
                    </div>
                </div>
            `).join('');
        }

        // Send message
        function sendMessage() {
            const messageText = document.getElementById('messageText');
            if (messageText.value.trim()) {
                console.log('Message sent:', messageText.value);
                messageText.value = '';
            }
        }

        // Close modal
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        // Call friend
        function callFriend() {
            alert('Video call initiated!');
        }

        // Theme functionality
        document.getElementById('themeBtn').addEventListener('click', () => {
            document.getElementById('themeModal').classList.add('active');
            populateThemeGrid();
        });

        function populateThemeGrid() {
            const themeGrid = document.getElementById('themeGrid');
            const themes = getAvailableThemes();
            themeGrid.innerHTML = themes.map(theme => `
                <button onclick="applyTheme('${theme.id}')" title="${theme.name}" style="padding: var(--spacing-md); background: var(--bg-secondary); border: 2px solid var(--border-color); border-radius: 6px; cursor: pointer; transition: all 0.3s ease; color: var(--text-primary);">
                    <i class="fas fa-paint-brush"></i>
                    <div style="font-size: 0.85rem; margin-top: 4px;">${theme.name}</div>
                </button>
            `).join('');
        }

        // Search messages
        document.getElementById('dmSearch').addEventListener('input', (e) => {
            const search = e.target.value.toLowerCase();
            const items = document.querySelectorAll('.channel-item');
            items.forEach(item => {
                item.style.display = item.textContent.toLowerCase().includes(search) ? '' : 'none';
            });
        });

        // Initialize
        window.addEventListener('load', () => {
            loadDMList();
            const savedTheme = localStorage.getItem('currentTheme') || 'discord';
            applyTheme(savedTheme);
        });

        // Close modals on background click
        document.getElementById('newMessageModal').addEventListener('click', (e) => {
            if (e.target.id === 'newMessageModal') closeModal('newMessageModal');
        });

        document.getElementById('themeModal').addEventListener('click', (e) => {
            if (e.target.id === 'themeModal') closeModal('themeModal');
        });

        // Info button toggle
        document.getElementById('infoBtn').addEventListener('click', () => {
            const sidebar = document.getElementById('userInfoSidebar');
            sidebar.style.width = sidebar.style.width === '280px' ? '0' : '280px';
        });
    </script>
</body>
</html>
